<!doctype html>
<html lang="ko" class="no-js">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0e14">
    <link rel="icon" href="data:,">
    <meta
      name="description"
      content="무대 뒤에서 모든 순간을 지켜보는 사람들, Sentinel Creative."
    >
    <title>Sentinel Creative — Always watching.</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      document.documentElement.classList.remove('no-js');
      document.documentElement.classList.add('has-js');
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.documentElement.classList.add('reduced-motion');
      }
    </script>
    <script src="film.js" defer></script>
  </head>
  <body>
    <main>
      <section class="film" aria-label="센티넬 크리에이티브 감시자의 세계">
        <div class="film__sticky">
          <img
            class="film__poster film__poster--motion"
            src="../shared/frames/frame_0001.webp"
            alt=""
            width="1152"
            height="648"
            aria-hidden="true"
          >
          <img
            class="film__poster film__poster--static"
            src="../shared/frames/frame_0290.webp"
            alt="어둠 속에 떠 있는 센티널의 황금빛 동심원 엠블럼"
            width="1152"
            height="648"
          >
          <canvas
            class="film__canvas"
            aria-label="스크롤에 따라 펼쳐지는 센티널의 세계"
          ></canvas>

          <div class="film__shade" aria-hidden="true"></div>

          <div class="film__overlays">
            <div class="film__line" data-start="0.04" data-end="0.18">
              <p>어둠 속에서,<br>우리는 깨어 있습니다</p>
            </div>
            <div class="film__line" data-start="0.26" data-end="0.44">
              <p>빛으로 향하는 길을<br>만드는 사람들</p>
            </div>
            <div class="film__line" data-start="0.52" data-end="0.68">
              <p>무대 위 모든 순간을<br>지켜봅니다</p>
            </div>
          </div>

          <div class="landing" aria-label="Sentinel Creative" data-frame-aligned>
            <div class="landing__band">
              <span class="landing__wordmark">SENTINEL</span>
            </div>
            <div class="landing__details">
              <p class="landing__tagline">Always watching.</p>
              <p class="landing__description">무대 뒤에서 모든 순간을 지켜보는 사람들, 센티널크리에이티브</p>
              <a class="landing__cta" href="https://sentinel-korea.com/" rel="noreferrer">
                ENTER SENTINEL <span aria-hidden="true">↗</span>
              </a>
            </div>
          </div>

          <div class="scroll-cue" aria-hidden="true">
            <span>SCROLL TO ENTER</span>
            <i></i>
          </div>

          <div class="loader" role="progressbar" aria-label="필름 불러오는 중" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span class="loader__bar"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
